{% extends 'base.html' %}

{% block content %}
<section class="section" style="padding-top: 150px; min-height: 80vh;">
    <div class="container d-flex justify-content-center">
        <div class="card shadow-sm border-0 p-4" style="max-width: 600px; width: 100%; border-radius: 16px; background: white;">
            <div class="mb-4">
                <div class="sec-kicker">Édition</div>
                <h2 class="sec-title" style="font-size: 1.4rem;">Modifier votre commentaire</h2>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn-primary-electric border-0">Enregistrer les modifications</button>
                    <a href="{{ request.META.HTTP_REFERER }}" class="btn-outline-glass" style="color: var(--navy); border-color: var(--navy);">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock content %}
