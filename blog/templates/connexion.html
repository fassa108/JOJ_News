{% extends 'base.html' %}

{% block title %}Connexion — JOJ News{% endblock %}

{% block content %}
<section class="section" style="padding-top: 150px; min-height: 80vh;">
    <div class="container d-flex justify-content-center">
        <div class="card shadow-sm border-0 p-4" style="max-width: 450px; width: 100%; border-radius: 16px; background: white;">
            <div class="mb-4 text-center">
                <div class="sec-kicker">Bon retour</div>
                <h2 class="sec-title" style="font-size: 1.8rem;">Se connecter</h2>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="email" class="form-label small fw-bold text-muted">Adresse Email</label>
                    <input type="email" name="email" class="form-control rounded-3" id="email" placeholder="nom@exemple.com" required>
                </div>
                <div class="mb-4">
                    <label for="mot_de_passe" class="form-label small fw-bold text-muted">Mot de passe</label>
                    <input type="password" name="mot_de_passe" class="form-control rounded-3" id="mot_de_passe" required>
                </div>
                <button type="submit" class="btn-primary-electric w-100 py-2 border-0 mb-3">Connexion</button>
                <div class="text-center">
                    <span class="small text-muted">Pas encore de compte ? <a href="{% url 'inscription' %}" class="text-decoration-none" style="color: var(--ocre);">S'inscrire</a></span>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
