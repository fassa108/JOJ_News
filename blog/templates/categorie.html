{% extends "base.html" %}

{% block content %}

<section class="py-5 bg-light min-vh-100" >
    <br><br><br><br>
    <div class="container">
        <div class="row justify-content-center mb-5 text-center">
            <div class="col-lg-7">
                <h1 class="fw-bold display-5 mb-3 text-dark">Nos Thématiques</h1>
                <!-- <p class="lead text-secondary">Explorez nos articles à travers différentes catégories pour trouver les sujets qui vous passionnent.</p> -->
                <div class="mx-auto mt-4" style="height: 5px; width: 50px; background-color: #0d6efd; border-radius: 10px;"></div>
            </div>
        </div>

        <!-- Grille des catégories -->
        <div class="row g-4">
            {% for cat in categories %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm category-card position-relative overflow-hidden">
                    <div class="card-body p-4 d-flex flex-column text-center">
                        <div class="category-icon-wrapper mb-3 mx-auto shadow-sm">
                            <!-- <span class="fs-2 text-primary">📁</span> -->
                        </div>
                        <h2 class="h4 fw-bold mb-3">{{ cat.nom }}</h2>
                        <!-- <p class="text-muted small flex-grow-1"> -->
                            <!-- Découvrez tous nos contenus et analyses récents publiés dans la section <strong>{{ cat.nom }}</strong>. -->
                        <!-- </p> -->
                        <div class="mt-4 pt-3 border-top">
                            <a href="{% url 'articles' %}?categorie={{ cat.id }}" class="btn btn-outline-primary rounded-pill px-4 transition-all fw-semibold">
                                Explorer la catégorie
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <div class="p-5 bg-white shadow-sm rounded-4 border border-dashed">
                    <p class="text-muted fs-5 mb-0">Aucune catégorie n'est disponible pour le moment.</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
<!-- pourquoi au niveau de l'accueil je ne vois pas -->
<style>
    /* Design Moderne et Animations */

    .category-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 1rem 3rem rgba(0,0,0,0.1) !important;
    }
    .category-icon-wrapper {
        width: 70px; height: 70px; background-color: #8a9eb3; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; transition: background-color 0.3s ease;
    }
    .transition-all { transition: all 0.3s ease; }
</style>
{% endblock %}
