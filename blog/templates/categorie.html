{% extends "base.html" %}

{% block content %}

<section class="section" style="padding-top: 130px; min-height: 100vh;">
    <div class="container">
        <div class="sec-header border-0 mb-5">
            <div>
                <div class="sec-kicker">Dakar 2026</div>
                <h1 class="sec-title" style="font-size: 2.5rem;">Explorez par Sport</h1>
            </div>
        </div>

        <div class="row g-4">
            {% for cat in categories %}
            <div class="col-6 col-md-4 col-lg-3">
                <a href="{% url 'articles' %}?categorie={{ cat.id }}" class="cat-card-modern">
                    <div class="cat-card-content">
                        <span class="cat-icon">⚡</span>
                        <h3 class="cat-title">{{ cat.nom }}</h3>
                        <span class="cat-meta">{{ cat.article_set.count }} articles</span>
                    </div>
                    <div class="cat-hover-bg"></div>
                </a>
            </div>
            {% empty %}
            <p class="no-content">Aucune catégorie disponible.</p>
            {% endfor %}
        </div>
    </div>
</section>

<style>
    .cat-card-modern {
        display: block;
        position: relative;
        background: var(--white);
        border-radius: 20px;
        padding: 2rem 1.5rem;
        text-decoration: none;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(26,39,68,0.05);
        height: 100%;
        text-align: center;
    }
    .cat-card-modern:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(26,39,68,0.12); border-color: var(--ocre); }
    .cat-icon { font-size: 2rem; display: block; margin-bottom: 1rem; }
    .cat-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--navy); margin-bottom: 0.5rem; }
    .cat-meta { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
</style>
{% endblock %}
