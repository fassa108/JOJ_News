{% extends 'base.html' %}

{% block title %}Inscription — JOJ News{% endblock %}

{% block content %}
<section class="section" style="padding-top: 150px; min-height: 90vh;">
    <div class="container d-flex justify-content-center">
        <div class="card shadow-sm border-0 p-4" style="max-width: 500px; width: 100%; border-radius: 16px; background: white;">
            <div class="mb-4 text-center">
                <div class="sec-kicker">Rejoignez-nous</div>
                <h2 class="sec-title" style="font-size: 1.8rem;">Créer un compte</h2>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold text-muted">Prénom</label>
                        {{ form.prenom }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold text-muted">Nom</label>
                        {{ form.nom }}
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Email</label>
                    {{ form.email }}
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Mot de passe</label>
                    {{ form.mot_de_passe }}
                </div>
                <button type="submit" class="btn-primary-electric w-100 py-2 border-0 mb-3">S'inscrire</button>
                <div class="text-center">
                    <span class="small text-muted">Déjà un compte ? <a href="{% url 'connexion' %}" class="text-decoration-none" style="color: var(--ocre);">Se connecter</a></span>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
